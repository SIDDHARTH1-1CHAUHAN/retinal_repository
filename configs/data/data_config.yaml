project:
  name: retinal-vit-pipeline
  framework: tensorflow-keras
  runtime_targets:
    - python
    - tensorflow
    - keras
    - opencv
    - streamlit
    - kaggle

interface_contract:
  metadata: data/metadata/master.csv
  splits:
    train: data/splits/train.csv
    val: data/splits/val.csv
    test: data/splits/test.csv
    external_test: data/splits/external_test.csv
  image_tensor:
    shape: [224, 224, 3]
    dtype: float32
    normalization: 0_to_1
  final_prediction_fields:
    - disease
    - severity
    - grade
    - confidence
    - stage1_confidence
    - stage2_confidence
    - stage1_probabilities
    - stage2_probabilities

labels:
  stage1:
    normal: 0
    dr: 1
    hr: 2
  stage2_dr: [1, 2, 3, 4]
  stage2_hr: [1, 2, 3, 4]
  inference_rule:
    normal: return_grade_0
    dr: call_dr_grader
    hr: call_hr_grader

preprocessing:
  crop_black_borders:
    enabled: true
    threshold: 7
  gaussian_blur:
    enabled: true
    kernel_size: [5, 5]
    sigma: 0.0
  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  resize:
    size: [224, 224]
  normalize:
    enabled: true
    scale: 255.0

augmentation:
  rotation_degrees: 15
  zoom_range: [0.9, 1.1]
  brightness_delta: 0.15
  horizontal_flip: false

splits:
  ratio:
    train: 0.70
    val: 0.15
    test: 0.15
  seed: 42
  group_column: patient_or_case_id
  stratify_columns:
    - source_dataset
    - disease_label
    - severity_bucket
  duplicate_guard:
    method: exact_dhash_after_preprocessing
    notes: Prevent identical or near-identical duplicates from crossing train/val/test or external-test boundaries.

external_test:
  exclude_quality_flags:
    - missing_diagnosis
    - unknown_grade
    - missing_fundus_image
    - ambiguous_stage0_with_lesions

kaggle:
  repo_dir_name: wt-integrate
  expected_runtime: free_gpu
  training_datasets:
    dr_combined: https://www.kaggle.com/datasets/harsha1289/combined-dr-dataset-aptosidridmessidoreyepacs
    eyepacs: https://www.kaggle.com/datasets/dreamer07/eyepacs
  hr_sources:
    odir: attach_public_odir_dataset
    rvm: attach_private_or_uploaded_rvm_dataset

datasets:
  eyepacs:
    enabled: true
    required: false
    parser: dr_grading
    labels_csv: data/raw/eyepacs/trainLabels.csv
    image_dir: data/raw/eyepacs/images
    image_column: image
    grade_column: level
    is_manual_label: true
    dataset_role: train
  aptos:
    enabled: true
    required: false
    parser: dr_grading
    labels_csv: data/raw/aptos/train.csv
    image_dir: data/raw/aptos/images
    image_column: id_code
    grade_column: diagnosis
    is_manual_label: true
    dataset_role: train
  messidor:
    enabled: true
    required: false
    parser: dr_grading
    labels_csv: data/raw/messidor/labels.csv
    image_dir: data/raw/messidor/images
    image_column: image_id
    grade_column: dr_grade
    is_manual_label: true
    dataset_role: train
  idrid:
    enabled: true
    required: false
    parser: dr_grading
    labels_csv: data/raw/idrid/labels.csv
    image_dir: data/raw/idrid/images
    image_column: image_id
    grade_column: dr_grade
    is_manual_label: true
    dataset_role: train
  odir:
    enabled: true
    required: true
    parser: odir
    labels_csv: data/raw/odir/full_df.csv
    image_dir: data/raw/odir/images
    is_manual_label: true
    dataset_role: train
  rvm:
    enabled: true
    required: true
    parser: rvm_hr
    labels_csv: data/raw/rvm/labels.csv
    image_dir: data/raw/rvm/images
    image_column: image_id
    grade_column: hr_grade
    is_manual_label: true
    dataset_role: train
  clinical_dr_test:
    enabled: true
    required: false
    parser: clinical_dr_text
    dataset_dir: ../test_data/Clinical Retinal Image Database
    skip_unknown_grades: true
    is_manual_label: true
    dataset_role: external_test
